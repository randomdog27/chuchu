<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Dot Matrix Text</title>
<style>
body{
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

.grid{
  display:grid;
  grid-template-columns: repeat(120, 10px);
  gap:6px;
}

.pixel{
  width:10px;
  height:4px;
  background:#111;
  border-radius:2px;
  transition:0.2s;
}

.pixel.on{
  background:white;
}
</style>
</head>
<body>

<div class="grid" id="grid"></div>

<script>
const text = "404";
const cols = 120;
const rows = 40;

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

canvas.width = cols;
canvas.height = rows;

ctx.fillStyle = "black";
ctx.fillRect(0,0,cols,rows);

ctx.fillStyle = "white";
ctx.font = "bold 30px Arial";
ctx.textAlign = "center";
ctx.textBaseline = "middle";
ctx.fillText(text, cols/2, rows/2);

const imageData = ctx.getImageData(0,0,cols,rows).data;

const grid = document.getElementById("grid");

for(let y=0;y<rows;y++){
  for(let x=0;x<cols;x++){
    const index = (y*cols + x)*4;
    const brightness = imageData[index]; 
    const div = document.createElement("div");
    div.className = "pixel";
    if(brightness > 100){
      div.classList.add("on");
    }
    grid.appendChild(div);
  }
}
</script>

</body>
</html>
