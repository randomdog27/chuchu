<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Interactive Dot Text</title>
<style>
  body{
    margin:0;
    background:black;
    overflow:hidden;
  }
  .dot{
    width:8px;
    height:3px;
    border-radius:2px;
    background:#111;
    transition: background 0.2s ease;
  }
</style>
</head>
<body>

<script>
const text = "404";
const cols = 180;
const rows = 60;

let mouseX = -1000;
let mouseY = -1000;

document.addEventListener("mousemove", e=>{
  mouseX = e.clientX;
  mouseY = e.clientY;
});

const container = document.createElement("div");
container.style.position = "fixed";
container.style.top = "0";
container.style.left = "0";
container.style.width = "100vw";
container.style.height = "100vh";
container.style.display = "grid";
container.style.gridTemplateColumns = `repeat(${cols}, 8px)`;
container.style.gap = "6px";
container.style.justifyContent = "center";
container.style.alignContent = "center";
document.body.appendChild(container);

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

canvas.width = cols;
canvas.height = rows;

ctx.fillStyle = "black";
ctx.fillRect(0,0,cols,rows);

ctx.fillStyle = "white";
ctx.font = "bold 50px Arial";
ctx.textAlign = "center";
ctx.textBaseline = "middle";
ctx.fillText(text, cols/2, rows/2);

const imageData = ctx.getImageData(0,0,cols,rows).data;

let dots = [];

for(let y=0;y<rows;y++){
  for(let x=0;x<cols;x++){
    const index = (y*cols + x)*4;
    const brightness = imageData[index];

    const dot = document.createElement("div");
    dot.className = "dot";

    if(brightness > 100){
      dot.style.background = "white";
      dot.dataset.active = "1";
    }

    container.appendChild(dot);
    dots.push(dot);
  }
}

function animate(){
  dots.forEach(dot=>{
    if(dot.dataset.active === "1"){
      const rect = dot.getBoundingClientRect();
      const dx = rect.left - mouseX;
      const dy = rect.top - mouseY;
      const distance = Math.sqrt(dx*dx + dy*dy);

      if(distance < 80){
        dot.style.background = "#00ffcc"; // màu khi hover gần
      } else {
        dot.style.background = "white";
      }
    }
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
